<!DOCTYPE html>
<html lang="en-PH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Documents | VaxTrack</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay hidden"><div class="loader-box"><div class="spinner"></div><p id="loaderText">Pinoproseso...</p></div></div>
  <div id="toast-container" class="toast-container"></div>
  <nav class="top-nav">
    <div class="nav-container nav-actions-only dashboard-nav">
      <div class="nav-right">
        <div class="user-pill"><div class="avatar-circle"><i class="fas fa-user-shield"></i></div><div class="user-details"><span id="userName">Admin</span><span class="role-text" data-i18n="role.health_worker">Health Worker</span></div></div>
        <button id="logoutBtn" class="logout-btn" aria-label="Mag-logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="sidebar">
      <a href="dashboard.html" data-i18n="nav.overview"><i class="fas fa-chart-pie" style="width:25px"></i> Overview</a>
      <a href="baby-management.html" data-i18n="nav.directory"><i class="fas fa-baby" style="width:25px"></i> Directory</a>
      <a href="vaccination-entry.html" data-i18n="nav.log_vaccine"><i class="fas fa-syringe" style="width:25px"></i> Log Vaccine</a>
      <a href="document-verification.html" class="active" data-i18n="nav.verify_docs"><i class="fas fa-file-contract" style="width:25px"></i> Verify Docs</a>
      <a href="schedule-management.html" data-i18n="nav.schedules"><i class="fas fa-calendar-alt" style="width:25px"></i> Schedules</a>
    </aside>
    <main class="main-content admin-docs-page" style="max-width:100%">
      <div class="card admin-action-table-card admin-doc-verification-card">
        <div class="admin-doc-toolbar">
          <div class="admin-doc-filter-row" aria-label="Filter documents by status">
            <button type="button" class="admin-filter-pill active" data-doc-filter="All Documents" aria-pressed="true">All Documents</button>
            <button type="button" class="admin-filter-pill" data-doc-filter="Pending" aria-pressed="false">Pending</button>
            <button type="button" class="admin-filter-pill" data-doc-filter="Approved" aria-pressed="false">Approved</button>
            <button type="button" class="admin-filter-pill" data-doc-filter="Rejected" aria-pressed="false">Rejected</button>
            <button type="button" class="admin-filter-pill" data-doc-filter="Re-upload Requested" aria-pressed="false">Re-upload Requested</button>
          </div>
        </div>
        <div class="table-responsive admin-table-shell">
          <table class="admin-data-table admin-doc-review-table">
            <thead><tr><th>Document</th><th>Baby Name</th><th>Date Uploaded</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="docList"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="../js/admin/document-verification.js"></script>
</body>
</html>
