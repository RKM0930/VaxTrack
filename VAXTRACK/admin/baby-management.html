<!DOCTYPE html>
<html lang="en-PH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directory | VaxTrack</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay hidden"><div class="loader-box"><div class="spinner"></div><p id="loaderText">Naglo-load...</p></div></div>
  <div id="toast-container" class="toast-container"></div>
  <nav class="top-nav">
    <div class="nav-container nav-actions-only dashboard-nav">
      <div class="nav-right">
        <div class="user-pill"><div class="avatar-circle"><i class="fas fa-user-shield"></i></div><div class="user-details"><span id="userName">Admin</span><span class="role-text" data-i18n="role.health_worker">Health Worker</span></div></div>
        <button id="logoutBtn" class="logout-btn" aria-label="Mag-logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="sidebar">
      <a href="dashboard.html" data-i18n="nav.overview"><i class="fas fa-chart-pie" style="width:25px"></i> Overview</a>
      <a href="baby-management.html" class="active" data-i18n="nav.directory"><i class="fas fa-baby" style="width:25px"></i> Directory</a>
      <a href="vaccination-entry.html" data-i18n="nav.log_vaccine"><i class="fas fa-syringe" style="width:25px"></i> Log Vaccine</a>
      <a href="document-verification.html" data-i18n="nav.verify_docs"><i class="fas fa-file-contract" style="width:25px"></i> Verify Docs</a>
      <a href="schedule-management.html" data-i18n="nav.schedules"><i class="fas fa-calendar-alt" style="width:25px"></i> Schedules</a>
    </aside>
    <main class="main-content admin-directory-page" style="max-width:100%">
      <div class="card admin-masterlist-card">
        <div class="toolbar admin-filter-toolbar">
          <div class="input-group"><i class="fas fa-search"></i><input type="text" id="adminBabySearch" class="form-control" data-i18n="admin.directory_search" placeholder="Search baby name, parent, or Reg No..."></div>
          <select id="ageGroupFilter" class="form-control admin-filter-select" aria-label="Filter by age group">
            <option value="all">All Age Groups</option>
            <option value="0-6">0–6 Months</option>
            <option value="7-12">7–12 Months</option>
            <option value="13-24">13–24 Months</option>
            <option value="25+">2 Years and Above</option>
          </select>
          <select id="statusFilter" class="form-control admin-filter-select" aria-label="Filter by status">
            <option value="all">All Statuses</option>
            <option value="fully-vaccinated">Fully Vaccinated</option>
            <option value="up-to-date">Up-to-date</option>
            <option value="due-soon">Due Soon</option>
            <option value="overdue">Overdue</option>
            <option value="pending-docs">Pending Docs</option>
            <option value="rejected-docs">Rejected Docs</option>
          </select>
        </div>
        <div class="table-responsive admin-table-shell">
          <table class="admin-data-table admin-masterlist-table">
            <thead>
              <tr>
                <th>Patient ID</th>
                <th>Baby's Full Name</th>
                <th>DOB (Age)</th>
                <th>Parent/Guardian</th>
                <th>Contact Number</th>
                <th>Status Summary</th>
              </tr>
            </thead>
            <tbody id="directoryList"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="../js/admin/baby-management.js"></script>
</body>
</html>
