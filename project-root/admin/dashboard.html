<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | VaxTrack</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay hidden"><div class="loader-box"><div class="spinner"></div><p id="loaderText">Loading...</p></div></div>
  
  <nav class="top-nav">
    <div class="nav-container" style="max-width: 100%;">
      <div class="logo">VaxTrack <span>BHW Portal</span></div>
      <div class="nav-right">
        <div class="user-pill"><div class="avatar-circle"><i class="fas fa-user-shield"></i></div><div class="user-details"><span id="userName">Admin</span><span class="role-text">Health Worker</span></div></div>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="sidebar">
      <a href="dashboard.html" class="active"><i class="fas fa-chart-pie" style="width:25px"></i> Overview</a>
      <a href="baby-management.html"><i class="fas fa-baby" style="width:25px"></i> Directory</a>
      <a href="vaccination-entry.html"><i class="fas fa-syringe" style="width:25px"></i> Log Vaccine</a>
      <a href="document-verification.html"><i class="fas fa-file-contract" style="width:25px"></i> Verify Docs</a>
      <a href="schedule-management.html"><i class="fas fa-calendar-alt" style="width:25px"></i> Schedules</a>
    </aside>
    
    <main class="main-content" style="max-width:100%">
      <div class="admin-header"><h2>Barangay Health Overview</h2></div>
      
      <div class="metric-cards">
        <div class="card metric-card"><div class="number" id="totalBabies">0</div>Total Registered</div>
        <div class="card metric-card"><div class="number" id="vaccinesMonth" style="color:var(--color-success)">0</div>Vaccines This Month</div>
        <div class="card metric-card"><div class="number" id="upcomingWeek" style="color:var(--color-warning)">0</div>Upcoming (7 Days)</div>
        <div class="card metric-card"><div class="number" id="overdueCount" style="color:var(--color-danger)">0</div>Overdue Alerts</div>
      </div>

      <div class="card">
        <h3 class="card-title">Urgent Alerts</h3>
        <table id="alertsTable">
          <thead><tr><th>Baby Name</th><th>Vaccine</th><th>Target Date</th><th>Status</th></tr></thead>
          <tbody id="alertsList"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script type="module" src="../js/admin/dashboard.js"></script>
</body>
</html>
