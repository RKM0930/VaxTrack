<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register Baby | VaxTrack</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay hidden"><div class="loader-box"><div class="spinner"></div><p id="loaderText">Saving...</p></div></div>
  <div id="toast-container" class="toast-container"></div>
  
  <nav class="top-nav"><div class="nav-container"><div class="logo">VaxTrack</div><div class="nav-right"><a href="dashboard.html" style="color:white;">Back</a></div></div></nav>
  
  <main class="main-content" style="max-width: 600px;">
    <div class="card">
      <h2 class="card-title">Register New Baby</h2>
      <form id="babyForm">
        <div class="field-group"><label>Baby Full Name</label><input type="text" name="name" required></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
          <div class="field-group"><label>Date of Birth</label><input type="date" name="dob" required></div>
          <div class="field-group"><label>Sex</label><select name="sex"><option>Male</option><option>Female</option></select></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
          <div class="field-group"><label>Birth Weight</label><input type="text" name="birthWeight" placeholder="e.g. 3.2 kg" required></div>
          <div class="field-group"><label>Blood Type (optional)</label><input type="text" name="bloodType"></div>
        </div>
        <div class="field-group"><label>Mother's Name</label><input type="text" name="motherName" required></div>
        <div class="field-group"><label>Father's Name</label><input type="text" name="fatherName" required></div>
        <div class="field-group">
          <label>Birth Certificate (PDF/JPG/PNG, max 5MB)</label>
          <input type="file" id="birthCert" name="document" accept=".pdf,.jpg,.jpeg,.png" required style="background: white;">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top:10px;">Submit Registration</button>
      </form>
    </div>
  </main>
  <script type="module" src="../js/user/baby-register.js"></script>
</body>
</html>
