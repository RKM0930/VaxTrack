<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Baby Profile | VaxTrack</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay hidden"><div class="loader-box"><div class="spinner"></div><p id="loaderText">Loading...</p></div></div>
  <div id="toast-container" class="toast-container"></div>
  
  <nav class="top-nav">
    <div class="nav-container">
      <div class="logo">VaxTrack</div>
      <div class="nav-right">
        <button class="lang-toggle-btn">EN / TL</button>
        <a href="dashboard.html" style="color:white;" data-i18n="nav.back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="main-content" id="profileContent" style="max-width: 900px;">
    <h2 id="babyName" style="font-size: 2rem; color: var(--color-dark); margin-bottom: 20px;"></h2>
    <div class="card" id="babyDetails" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    
    <div class="card mt-2">
      <h3 class="card-title" data-i18n="profile.calendar"><i class="far fa-calendar-alt"></i> Vaccination Calendar</h3>
      <div id="vaccineCalendar"></div>
    </div>

    <div class="card mt-2">
      <h3 class="card-title" data-i18n="profile.history">Vaccination History</h3>
      <table>
        <thead><tr><th data-i18n="table.vaccine">Vaccine</th><th data-i18n="table.date">Date</th><th data-i18n="table.dose">Dose</th><th data-i18n="table.batch">Batch</th><th data-i18n="table.worker">Worker</th><th data-i18n="table.status">Status</th></tr></thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>

    <div class="card mt-2">
      <h3 class="card-title" data-i18n="profile.upcoming">Upcoming Vaccinations</h3>
      <table>
        <thead><tr><th data-i18n="table.vaccine">Vaccine</th><th data-i18n="table.target">Target Date</th><th data-i18n="table.status">Status</th></tr></thead>
        <tbody id="upcomingTable"></tbody>
      </table>
    </div>
  </main>
  
  <script type="module" src="../js/user/baby-profile.js"></script>
</body>
</html>
